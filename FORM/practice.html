<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Form</title>
</head>

<body>
    <center>
        <h1>Form HTML</h1>
        <fieldset width="200">
            <legend>form</legend>
            <form>
                <label for="Name">Name</label>
                <input type="text" id="Name" placeholder="enter your name" required pattern="[A-Za-z]+">
                <br>
                Email <input type="email">
                <br>
                password <input type="password" pattern="[0-4]{3}">
                <br>
                TelePhone <input type="tel">
                <br>
                Age <input type="number" step="1">
                <br>
                Date <input type="date">
                <br>
                Time <input type="time">
                <br>
                Time-Date <input type="datetime-local">
                <br>
                Month <input type="month">
                <br>
                Week <input type="week" name="" id="">
                <br>
                Url <input type="url" name="" id="">
                <br>
                Search <input type="search">
                <br>
                Color <input type="color" value="red" name="" id="">
                <br>
                CheckBox <input type="checkbox" name="CS">CS
                <input type="checkbox" name="Web"> web
                <br>
                radio <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <br>
                File <input type="file">
                <br>
                hidden <input type="hidden" placeholder="enter">
                <br>
                image <input type="image" src="" alt="">
                <br>
                <input type="reset" value="Reset">
                <input type="Submit" value="Submit">
                <br>
                Range<input type="range" name="" id="">
                <br>
                <textarea rows="10" cols="20"></textarea>
                <br>
                <select>
                    <option value="subjects">urdu</option>
                    <option value="subjects" selected>---------science---------</option>
                    <option value="subjects">math</option>
                </select>

            </form>
        </fieldset>
    </center>

</body>

</html>
