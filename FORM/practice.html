<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Form</title>
</head>

<body>
    <!-- Semantic HTML5 Form Elements:
    Semantic HTML5 form elements like <label>, <fieldset>, and <legend> provide better structure and accessibility to forms.

    <label>: Associates text labels with form elements for better user understanding.
    <fieldset>: Groups related form elements together, creating a visual and semantic grouping.
    <legend>: Provides a caption or title for the <fieldset> element. -->
    <center>
        <h1>Form HTML</h1>
        <fieldset>
            <legend align="center">form</legend>
            <form>
                <label for="Name">Name</label>
                <br>
                <input type="text" id="Name" placeholder="enter your name" required pattern="[A-Za-z]+">
                <br>
                <label for="email">Email</label>
                <br>
                <input type="email" id="email">
                <br>
                <label for="password">password</label>
                <br>
                <input type="password" id="password" pattern="[0-4]{3}">
                <br>
                <label for="telephone">TelePhone</label>
                <br>
                <input type="tel" id="telephone">
                <br>
                <label for="age">Age</label>
                <br>
                <input type="number" step="1" id="age">
                <br>
                <label for="date">Date</label>
                <br>
                <input type="date" id="date">
                <br>
                <label for="time">Time</label>
                <br>
                <input type="time" id="time">
                <br>
                <label for="dateTime">Time-Date</label>
                <br>
                <input type="datetime-local" id="dateTime">
                <br>
                <label for="month">Month</label>
                <br>
                <input type="month" id="month">
                <br>
                <label for="week">Week</label>
                <br>
                <input type="week" name="" id="week">
                <br>
                <label for="linkss">Url</label>
                <br>
                <input type="url" name="" id="linkss">
                <br>
                <label for="search">Search</label>
                <br>
                <input type="search" id="search">
                <br>
                <label for="Color">Color</label>
                <br>
                <input type="color" value="red" name="" id="Color">
                <br>
                <label for="CheckBox">CheckBox</label>
                <input type="checkbox" name="CS" id="CheckBox">CS
                <input type="checkbox" name="Web" id="CheckBox"> web
                <br>
                <label for="radio">radio</label>
                <input type="radio" name="gender" id="radio"> Male
                <input type="radio" name="gender" id="radio"> Female
                <br>
                <label for="File">File</label>
                <br>
                <input type="file">
                <br>
                <label for="hidden">hidden</label>
                <br>
                <input type="hidden" placeholder="enter">
                <br>
                image <input type="image" src="" alt="">
                <br>
                <input type="reset" value="Reset">
                <input type="Submit" value="Submit">
                <br>
                <label for="Range">Range</label>
                <br>
                <input type="range" name="" id="Range" value="90" min="0" max="100">
                <br>
                <label for="comments">comments</label>
                <br>
                <textarea rows="10" cols="20" id="comments">comments</textarea>
                <br>
                <label for="choose">choose</label>
                <br>
                <select id="choose">
                    <option value="subjects">urdu</option>
                    <option value="subjects" selected>---------science---------</option>
                    <option value="subjects">math</option>
                </select>

            </form>
        </fieldset>
    </center>

</body>

</html>
