<!DOCTYPE html>
<html lang="en">

<head>
    <!-- meta Tags for metadata
         meta tags are HTML elements that provide metadata about a webpage.
         They are placed within the <head> section of an HTML document and are not visible
         to users but are used by browsers search engines and other web services to gather
         information about the page -->


    <meta charset="UTF-8">
    <!-- specifies the character encoding for the webpage, ensuring proper rendering of characters 
         Your webpage contains letters, numbers, symbols, and possibly different languages.
         The browser needs to know which "dictionary" to use to understand those characters.
         UTF-8 is that dictionary. It can handle English, Arabic, Urdu, Chinese, emojis 😊, 
         and many other characters.
         
         That's all it does: it helps the browser show text and symbols correctly on the webpage-->




    <meta name="description" content="This is the information of metadata">
    <!-- provides a concise description of the page's content -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- sets the properties for responsive design -->

    <meta name="keywords" content=",tags , metadata">
    <!-- specifies relevant keywords for search engines (not as impactful as it used to be) -->

    <meta name="author" content="Author's Name">
    <!-- indicates the author of the webpage -->


    <!-- Charset → How to read the text.
         Keywords → What the page is about.
         Author → Who made the page. -->


    <meta name="robots" content="index, follow">
    <!-- instructs search engine robots whether to index and follow links on the page -->
    <!-- index → Allow search engines to include this page in their search results.
         follow → Allow search engines to follow the links on this page and discover other pages. -->



    <!-- index => Include the page in search results
    noindex => Do not include the page in search results
    follow => Follow links on the page
    nofollow => Do not follow links on the page -->


    <title>meta tags</title>
</head>

<body>
    <!-- HTML SEO -->
     <!-- high-quality content: create valuable and relevant content that addresses user's need.
          keyword Research: use relevant keywords naturally within your content.
          Description Titles: use discriptive and relevant titles for your pages(<title> tag).
          Heading: use appropriate heading tags(<h1>,<h2>,<h3>....etc) to structure content.
          Image Alt Text: provide description alt text for images.
          Internal Links: Use internal links to connect related content within your sit.
          External Links: Link to reputable external sources when relevant.
          Mobile-Friendly Design: Ensure your website is responsive and mobile friendly.
          site speed: Optimize your website's loading speed for better user experience  -->
</body>

</html>
