<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic</title>
</head>

<body>
    <!-- Semantic HTML5 elements are an important part of modern web development as they provide a clearer structure to web documents and improve accessibility, search engine optimization, and styling. -->

    <!-- <header> – Represents the introductory content for a section, article, or entire web page. Ex: contains logo, site title etc.  
    <nav> – Navigation menu links would all be placed in a <nav> tag.  
    <main> – The body of a page should go in the <main> tag. There should be only one per page.  
    <article> – Represents an independent article on a web page. For example, a blog post.  
    <section> – Represents a way of grouping together nearby content of a similar theme.  
    <aside> – Represents content that’s less important. It’s mostly used for sidebars (ads).  
    <footer> – Represents the base of a page or section. It might include information and some site navigation. -->

    <header>
        <!-- Header content goes here -->
        <nav>
            <!-- Navigation menu goes here -->
        </nav>
    </header>

    <main>
        <!-- Main content of the page goes here -->
        <article>
            <!-- Article content goes here -->
        </article>

        <section>
            <!-- Section content goes here -->
        </section>
    </main>

    <aside>
        <!-- Sidebar content goes here -->
    </aside>

    <footer>
        <!-- Footer content goes here -->
    </footer>

</body>

</html>
