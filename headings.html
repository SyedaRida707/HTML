<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headings</title>
</head>

<body>
    <h1>The best way to learn to study independently.</h1>
    <h2>The best way to learn to study independently.</h2>
    <h3>The best way to learn to study independently.</h3>
    <h4>The best way to learn to study independently.</h4>
    <h5>The best way to learn to study independently.</h5>
    <h6>The best way to learn to study independently.</h6>
</body>

</html>

<!-- The tags element name is case-insensitive -->
<!-- A singular H1 is typically used per page is best for the SEO -->
<!-- follow hierarchy from h1 to h6 consistently -->
