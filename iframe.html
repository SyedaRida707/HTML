    <title>Iframe</title>

<body>
    <!-- The <iframe> HTML element represents a nested browsing context,
         embedding another HTML page into the current one. -->
    <!-- Simple The HTML iframe tag is used to display a nested webpage
              it represent a webpage within a webpage -->



    <!-- frameborder="0"
    ➜ Border hide
    
    allowfullscreen
    ➜ Full screen allow
    
    autoplay
    ➜ Auto play give permission to allow when click-->

    <!-- allow="autoplay"
    ➜ Autoplay ki permission
    ➜ Browser iframe ko video auto-play karne ki ijazat deta hai -->


    <!-- <iframe width="560" height="315" src="https://www.youtube.com/embed/xSQeV-t0gEg?si=rlM0bKEMtZWX4gV1"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
